<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Svenska Nyheter">
  <title>Svenska Nyheter</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      color: #333;
    }
    html, body, #root {
      height: 100%;
      width: 100%;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    function NewsApp() {
      const [articles, setArticles] = React.useState([]);
      const [categories, setCategories] = React.useState([]);
      const [selectedCategory, setSelectedCategory] = React.useState('general');
      const [searchTerm, setSearchTerm] = React.useState('');
      const [loading, setLoading] = React.useState(false);
      const [error, setError] = React.useState(null);
      const [showSettings, setShowSettings] = React.useState(false);
      const [isSearching, setIsSearching] = React.useState(false);

      const API_URL = 'https://svenska-nyheter.onrender.com';

      // Hämta kategorier
      React.useEffect(() => {
        const fetchCategories = async () => {
          try {
            const response = await fetch(`${API_URL}/api/categories`);
            if (response.ok) {
              const data = await response.json();
              setCategories(data.categories);
              setError(null);
            }
          } catch (err) {
            console.error('Fel:', err);
            setError('Kunde inte ansluta till servern');
          }
        };
        fetchCategories();
      }, []);

      // Hämta nyheter efter kategori
      const fetchNewsByCategory = async (category) => {
        setLoading(true);
        setError(null);
        setIsSearching(false);

        try {
          const response = await fetch(`${API_URL}/api/news?category=${category}`);
          if (!response.ok) {
            throw new Error(`Server svarade med status ${response.status}`);
          }
          const data = await response.json();
          setArticles(data.articles || []);
        } catch (err) {
          setError(`Fel: ${err.message}`);
        } finally {
          setLoading(false);
        }
      };

      // Sök nyheter
      const handleSearch = async (query) => {
        if (!query.trim()) {
          fetchNewsByCategory(selectedCategory);
          return;
        }

        setLoading(true);
        setError(null);
        setIsSearching(true);

        try {
          const response = await fetch(`${API_URL}/api/search?q=${encodeURIComponent(query)}`);
          if (!response.ok) {
            throw new Error(`Server svarade med status ${response.status}`);
          }
          const data = await response.json();
          setArticles(data.articles || []);
        } catch (err) {
          setError(`Fel: ${err.message}`);
        } finally {
          setLoading(false);
        }
      };

      // Hantera kategoriändring
      const handleCategoryChange = (category) => {
        setSelectedCategory(category);
        setSearchTerm('');
        fetchNewsByCategory(category);
      };

      // Hämta nyheter när komponenten laddas
      React.useEffect(() => {
        if (categories.length > 0) {
          fetchNewsByCategory(selectedCategory);
        }
      }, []);

      const formatDate = (dateString) => {
        const date = new Date(dateString);
        const today = new Date();
        const yesterday = new Date(today);
        yesterday.setDate(yesterday.getDate() - 1);

        if (date.toDateString() === today.toDateString()) {
          return date.toLocaleTimeString('sv-SE', { hour: '2-digit', minute: '2-digit' });
        } else if (date.toDateString() === yesterday.toDateString()) {
          return 'Igår';
        } else {
          return date.toLocaleDateString('sv-SE', { month: 'short', day: 'numeric' });
        }
      };

      const styles = {
        container: {
          maxWidth: '600px',
          margin: '0 auto',
          backgroundColor: '#fff',
          minHeight: '100vh',
          fontFamily: 'system-ui, -apple-system, sans-serif',
          color: '#333',
        },
        header: {
          display: 'flex',
          justifyContent: 'space-between',
          alignItems: 'center',
          padding: '16px',
          borderBottom: '1px solid #eee',
          backgroundColor: '#f9f9f9',
          position: 'sticky',
          top: 0,
          zIndex: 100,
        },
        title: {
          margin: 0,
          fontSize: '24px',
          fontWeight: '600',
        },
        settingsBtn: {
          background: 'none',
          border: 'none',
          fontSize: '24px',
          cursor: 'pointer',
          padding: '8px',
        },
        settingsPanel: {
          padding: '16px',
          backgroundColor: '#f5f5f5',
          borderBottom: '1px solid #ddd',
        },
        sectionTitle: {
          fontSize: '16px',
          fontWeight: '600',
          marginTop: '16px',
          marginBottom: '8px',
        },
        searchInput: {
          width: '100%',
          padding: '10px',
          marginBottom: '12px',
          border: '1px solid #ccc',
          borderRadius: '6px',
          fontSize: '14px',
          boxSizing: 'border-box',
        },
        categoryButtons: {
          display: 'flex',
          flexWrap: 'wrap',
          gap: '8px',
          marginBottom: '16px',
        },
        categoryBtn: {
          padding: '8px 12px',
          border: '1px solid #ddd',
          borderRadius: '20px',
          fontSize: '14px',
          cursor: 'pointer',
          backgroundColor: '#fff',
          transition: 'all 0.2s',
        },
        categoryBtnActive: {
          backgroundColor: '#007AFF',
          color: '#fff',
          border: '1px solid #007AFF',
        },
        closeBtn: {
          backgroundColor: '#007AFF',
          color: 'white',
          border: 'none',
          padding: '10px 20px',
          borderRadius: '6px',
          fontSize: '16px',
          fontWeight: '600',
          cursor: 'pointer',
          width: '100%',
        },
        error: {
          padding: '12px 16px',
          backgroundColor: '#FFE0E0',
          color: '#c00',
          borderBottom: '1px solid #FFB3B3',
          fontSize: '14px',
        },
        loading: {
          padding: '16px',
          textAlign: 'center',
          color: '#666',
          fontSize: '14px',
        },
        articlesList: {
          padding: '0',
        },
        noArticles: {
          padding: '32px 16px',
          textAlign: 'center',
          color: '#999',
        },
        articleCard: {
          display: 'block',
          padding: '12px 16px',
          borderBottom: '1px solid #eee',
          textDecoration: 'none',
          color: 'inherit',
        },
        articleImage: {
          width: '100%',
          height: '180px',
          objectFit: 'cover',
          borderRadius: '6px',
          marginBottom: '8px',
        },
        articleTitle: {
          margin: '0 0 6px 0',
          fontSize: '16px',
          fontWeight: '600',
          lineHeight: '1.3',
          color: '#111',
        },
        articleDescription: {
          margin: '0 0 8px 0',
          fontSize: '14px',
          color: '#666',
          lineHeight: '1.4',
        },
        articleMeta: {
          display: 'flex',
          justifyContent: 'space-between',
          fontSize: '12px',
          color: '#999',
        },
        source: {
          fontWeight: '600',
          color: '#007AFF',
        },
      };

      return (
        <div style={styles.container}>
          <div style={styles.header}>
            <h1 style={styles.title}>Svenska Nyheter</h1>
            <button onClick={() => setShowSettings(!showSettings)} style={styles.settingsBtn}>
              ⚙️
            </button>
          </div>

          {showSettings && (
            <div style={styles.settingsPanel}>
              <h2 style={styles.sectionTitle}>Kategorier</h2>
              <div style={styles.categoryButtons}>
                {categories.map(cat => (
                  <button
                    key={cat.id}
                    onClick={() => handleCategoryChange(cat.id)}
                    style={{
                      ...styles.categoryBtn,
                      ...(selectedCategory === cat.id ? styles.categoryBtnActive : {})
                    }}
                  >
                    {cat.name}
                  </button>
                ))}
              </div>

              <h2 style={styles.sectionTitle}>Sök nyheter</h2>
              <input
                type="text"
                value={searchTerm}
                onChange={(e) => setSearchTerm(e.target.value)}
                onKeyPress={(e) => {
                  if (e.key === 'Enter') {
                    handleSearch(searchTerm);
                  }
                }}
                placeholder="Sök efter ord, person, organisation..."
                style={styles.searchInput}
              />
              <button
                onClick={() => handleSearch(searchTerm)}
                style={{
                  ...styles.closeBtn,
                  marginBottom: '12px'
                }}
              >
                Sök
              </button>

              <button onClick={() => setShowSettings(false)} style={styles.closeBtn}>
                Stäng
              </button>
            </div>
          )}

          {error && <div style={styles.error}>⚠️ {error}</div>}

          {loading && <div style={styles.loading}>Hämtar nyheter...</div>}

          {!showSettings && (
            <div style={styles.articlesList}>
              {articles.length === 0 && !loading && (
                <p style={styles.noArticles}>
                  {isSearching ? 'Inga sökresultat funna.' : 'Inga nyheter funna.'}
                </p>
              )}

              {articles.map((article, index) => (
                <a
                  key={index}
                  href={article.link}
                  target="_blank"
                  rel="noopener noreferrer"
                  style={styles.articleCard}
                >
                  {article.image && (
                    <img
                      src={article.image}
                      alt=""
                      style={styles.articleImage}
                      onError={(e) => (e.target.style.display = 'none')}
                    />
                  )}
                  <div>
                    <h3 style={styles.articleTitle}>{article.title}</h3>
                    <p style={styles.articleDescription}>{article.description}</p>
                    <div style={styles.articleMeta}>
                      <span style={styles.source}>{article.source}</span>
                      <span>{formatDate(article.pubDate)}</span>
                    </div>
                  </div>
                </a>
              ))}
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<NewsApp />);
  </script>
</body>
</html>
